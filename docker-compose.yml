services:
  postgres:
    image: postgres:16
    container_name: reelpin-postgres
    environment:
      POSTGRES_USER: reelpin
      POSTGRES_PASSWORD: reelpin
      POSTGRES_DB: reelpin
    ports:
      - "5432:5432"
    volumes:
      - reelpin_pgdata:/var/lib/postgresql/data

volumes:
  reelpin_pgdata:
